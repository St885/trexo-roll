<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles/main.css">
<link rel="stylesheet" href="frame.css"></head>
<body class="is-portrait">
<canvas id="bg"></canvas>
<section class="screen active" id="screen-menu">
  <div class="panel menu-panel">
    <header class="menu-head">
      <div class="ball-preview menu-avatar"><canvas class="kit-thumb" data-size="76"></canvas></div>
      <div class="menu-head-text">
        <h2 class="menu-title">TREX<span>o</span>Roll</h2>
        <p class="menu-greeting">¡Hola! Sigue conquistando tableros 🦖</p>
      </div>
    </header>
    <div class="menu-stats">
      <div class="menu-pills">
        <span class="stat-pill"><span class="pill-ic">⭐</span><b>96/150</b></span>
        <span class="stat-pill"><span class="pill-ic">🔓</span><b>18/50</b></span>
        <span class="stat-pill"><span class="pill-ic">🏆</span><b>2 880</b></span>
      </div>
      <div class="menu-progress"><div class="progress-bar"><div class="progress-fill" style="width:64%"></div></div><span class="progress-pct">64%</span></div>
    </div>
    <div class="menu-cta">
      <button class="btn primary cta-main">⏩ Continuar</button>
      <button class="btn primary cta-main cta-hero">▶ Jugar</button>
    </div>
    <nav class="menu-tiles">
      <button class="menu-tile tile-feature"><span class="tile-ic">🎁</span><span class="tile-label">Diario</span></button>
      <button class="menu-tile"><span class="tile-ic">🦕</span><span class="tile-label">Dino</span></button>
      <button class="menu-tile"><span class="tile-ic">🎨</span><span class="tile-label">Skins</span></button>
      <button class="menu-tile tile-feature"><span class="tile-ic">🧰</span><span class="tile-label">Cofre</span></button>
      <button class="menu-tile"><span class="tile-ic">♻️</span><span class="tile-label">Canje</span></button>
      <button class="menu-tile"><span class="tile-ic">🗺️</span><span class="tile-label">Niveles</span></button>
    </nav>
    <div class="menu-util">
      <button class="util-btn"><span class="util-ic">❓</span><span class="util-tx">Ayuda</span></button>
      <button class="util-btn"><span class="util-ic">⚙️</span><span class="util-tx">Ajustes</span></button>
      <button class="util-btn"><span class="util-ic">⛶</span><span class="util-tx">Pantalla</span></button>
      <div class="lang-mini"><button class="lang-btn active">ES</button><button class="lang-btn">EN</button></div>
    </div>
  </div>
</section>
<script src="kit.js"></script><script src="bg.js"></script>
</body></html>
