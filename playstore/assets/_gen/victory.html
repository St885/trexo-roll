<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles/main.css">
<link rel="stylesheet" href="frame.css"></head>
<body class="is-portrait">
<canvas id="bg"></canvas>
<section class="screen active" id="screen-win">
  <div class="sparkles" aria-hidden="true">
    <span style="left:8%;animation-delay:0s">✨</span><span style="left:22%;animation-delay:.5s">🌟</span>
    <span style="left:38%;animation-delay:1.1s">⭐</span><span style="left:54%;animation-delay:.3s">✨</span>
    <span style="left:70%;animation-delay:1.4s">🌟</span><span style="left:86%;animation-delay:.8s">⭐</span>
  </div>
  <div class="panel win-panel">
    <div class="win-trophy"><span class="win-trophy-ic">🏆</span></div>
    <h2 class="win-title">¡Nivel superado!</h2>
    <p class="win-stars"><span class="won">★</span><span class="won">★</span><span class="won">★</span></p>
    <div class="win-missions">
      <span class="wm-chip ok">🥚 ✓</span><span class="wm-chip ok">⏱️ ✓</span><span class="wm-chip ok">🪙 ✓</span>
    </div>
    <div class="win-stats">
      <div class="win-stat"><span class="ws-ic">🎯</span><span class="ws-lbl">Puntos</span><b class="ws-val">1 740</b></div>
      <div class="win-stat"><span class="ws-ic">✨</span><span class="ws-lbl">Recompensa</span><b class="ws-val">+1 490</b></div>
      <div class="win-stat"><span class="ws-ic">⏱️</span><span class="ws-lbl">Tiempo</span><b class="ws-val">0:38.6</b></div>
      <div class="win-stat"><span class="ws-ic">⭐</span><span class="ws-lbl">Progreso</span><b class="ws-val">99/150</b></div>
    </div>
    <p class="win-bonus">Bonus: 🏅 ¡Nuevo récord! · 🔓 ¡Nuevo nivel!</p>
    <div class="win-actions">
      <button class="btn primary win-cta">Siguiente nivel ▶</button>
      <div class="win-actions-row">
        <button class="btn win-sec">↻ Repetir</button>
        <button class="btn win-sec ghost">Menú</button>
      </div>
    </div>
  </div>
</section>
<script src="kit.js"></script><script src="bg.js"></script>
</body></html>
