<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TREXoRoll — Previsualización del menú (v0.21)</title>
  <!-- Usa el CSS REAL del juego para reflejar el diseño tal cual. -->
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    /* Solo para esta previsualización estática (el avatar real es un <canvas> de JS). */
    body { overflow: auto; }
    .menu-avatar .preview-ball {
      width: 60px; height: 60px; border-radius: 50%;
      display: grid; place-items: center; font-size: 30px;
      background: radial-gradient(circle at 35% 28%, #ffffff, #d5dde2 72%, #b9c4cb);
      border: 2px solid rgba(242, 193, 78, 0.65);
      box-shadow: 0 6px 16px rgba(0,0,0,0.45), 0 0 14px rgba(52, 210, 123, 0.28);
    }
    .preview-note {
      position: fixed; top: 8px; left: 8px; z-index: 9; font: 700 11px/1.3 system-ui;
      color: #f6f1e3; background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 8px;
      border: 1px solid rgba(242,193,78,0.4); max-width: 60vw;
    }
  </style>
</head>
<body>
  <div class="preview-note">Previsualización estática del menú (datos de muestra). El juego real usa este mismo CSS.</div>
  <div id="ui">
    <section class="screen active" id="screen-menu">
      <div class="bg-decor" aria-hidden="true">
        <span class="floaty f1">🌿</span><span class="floaty f3">🥚</span><span class="floaty f4">🦴</span>
      </div>
      <div class="panel menu-panel">
        <header class="menu-head">
          <div class="ball-preview menu-avatar" aria-hidden="true"><div class="preview-ball">🦖</div></div>
          <div class="menu-head-text">
            <h2 class="menu-title">TREX<span>o</span>Roll</h2>
            <p class="menu-greeting">¡Hola, Stefano!</p>
          </div>
        </header>
        <div class="menu-stats">
          <div class="menu-pills">
            <span class="stat-pill"><span class="pill-ic">⭐</span><b>87/150</b></span>
            <span class="stat-pill"><span class="pill-ic">🔓</span><b>23/50</b></span>
            <span class="stat-pill"><span class="pill-ic">🏆</span><b>14820</b></span>
          </div>
          <div class="menu-progress">
            <div class="progress-bar"><div class="progress-fill" style="width:58%"></div></div>
            <span class="progress-pct">58%</span>
          </div>
        </div>
        <div class="menu-cta">
          <button class="btn primary cta-main" id="btn-continue">⏩ Continuar</button>
          <button class="btn primary cta-main cta-hero" id="btn-play">▶ Jugar</button>
        </div>
        <nav class="menu-tiles" aria-label="Secciones">
          <button class="menu-tile tile-feature ready" id="btn-daily">
            <span class="tile-badge dot"></span>
            <span class="tile-ic">🎁</span><span class="tile-label">Diario</span>
          </button>
          <button class="menu-tile" id="btn-balls"><span class="tile-ic">🦕</span><span class="tile-label">Dino</span></button>
          <button class="menu-tile" id="btn-skins"><span class="tile-ic">🎨</span><span class="tile-label">Skins</span></button>
          <button class="menu-tile tile-feature ready" id="btn-chest">
            <span class="tile-badge">2</span>
            <span class="tile-ic">🧰</span><span class="tile-label">Cofre</span>
          </button>
          <button class="menu-tile" id="btn-shop">
            <span class="tile-badge amber">⭐12</span>
            <span class="tile-ic">🛒</span><span class="tile-label">Canje</span>
          </button>
          <button class="menu-tile" id="btn-levels"><span class="tile-ic">🗺️</span><span class="tile-label">Niveles</span></button>
        </nav>
        <div class="menu-util">
          <button class="util-btn"><span class="util-ic">❓</span><span class="util-tx">Ayuda</span></button>
          <button class="util-btn"><span class="util-ic">⚙️</span><span class="util-tx">Ajustes</span></button>
          <button class="util-btn"><span class="util-ic">⛶</span><span class="util-tx">Pantalla</span></button>
          <div class="lang-mini">
            <button class="lang-btn active" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
